name: kernelbell

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "monitor"
        type: choice
        options:
          - monitor
          - test-mail
      test_email:
        description: "Email address for test-mail mode"
        required: false

permissions:
  contents: write

concurrency:
  group: kernelbell-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check patches
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TLS: ${{ secrets.SMTP_TLS }}
          KERNELBELL_NOTIFY_TO: ${{ secrets.KERNELBELL_NOTIFY_TO }}
          KERNELBELL_MAINLINE_GITHUB_REPO: ${{ vars.KERNELBELL_MAINLINE_GITHUB_REPO }}
          KERNELBELL_STABLE_GITHUB_REPO: ${{ vars.KERNELBELL_STABLE_GITHUB_REPO }}
          KERNELBELL_LOOKBACK_COMMITS: ${{ vars.KERNELBELL_LOOKBACK_COMMITS }}
        run: |
          if [ "${{ github.event.inputs.mode }}" = "test-mail" ]; then
            python3 scripts/monitor.py --test-mail "${{ github.event.inputs.test_email }}"
          else
            python3 scripts/monitor.py
          fi

      - name: Commit status updates
        if: ${{ github.event.inputs.mode != 'test-mail' }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update kernelbell status"
          file_pattern: state.json docs/status.json
