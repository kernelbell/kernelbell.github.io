name: kernelbell

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: kernelbell-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore git cache
        uses: actions/cache@v4
        with:
          path: .kernelbell-cache
          key: kernelbell-git-cache-v1
          restore-keys: |
            kernelbell-git-cache-

      - name: Check patches
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TLS: ${{ secrets.SMTP_TLS }}
          KERNELBELL_NOTIFY_TO: ${{ secrets.KERNELBELL_NOTIFY_TO }}
          KERNELBELL_MAINLINE_REPO: ${{ vars.KERNELBELL_MAINLINE_REPO }}
          KERNELBELL_STABLE_REPO: ${{ vars.KERNELBELL_STABLE_REPO }}
        run: python3 scripts/monitor.py

      - name: Commit status updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update kernelbell status"
          file_pattern: state.json docs/status.json
