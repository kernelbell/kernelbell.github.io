<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>kernelbell</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="shell">
      <section class="masthead">
        <div>
          <p class="eyebrow">kernelbell</p>
          <h1>Linux patch merge monitor</h1>
        </div>
        <button id="refresh" class="icon-button" title="Refresh status" aria-label="Refresh status">R</button>
      </section>

      <section class="panel metrics" aria-label="Monitor summary">
        <div>
          <span id="total-count">0</span>
          <label>Tracked</label>
        </div>
        <div>
          <span id="mainline-count">0</span>
          <label>Mainline</label>
        </div>
        <div>
          <span id="stable-count">0</span>
          <label>Stable</label>
        </div>
        <div>
          <span id="generated-at">-</span>
          <label>Last Check</label>
        </div>
      </section>

      <section class="workspace">
        <form id="patch-form" class="panel editor">
          <h2>Add patch</h2>
          <label>
            <span>Patch title</span>
            <input id="title" name="title" required placeholder="subsystem: fix something important">
          </label>
          <div class="grid-2">
            <label>
              <span>Stable branch</span>
              <input id="stable_branch" name="stable_branch" placeholder="linux-6.6.y">
            </label>
            <label>
              <span>Email</span>
              <input id="notify" name="notify" type="email" placeholder="you@example.com">
            </label>
          </div>
          <label>
            <span>GitHub token</span>
            <input id="token" name="token" type="password" autocomplete="off" placeholder="fine-grained token with contents write">
          </label>
          <div class="actions">
            <button type="submit">Add</button>
            <button id="save-token" type="button" class="secondary">Remember token</button>
          </div>
          <p id="form-message" class="message" role="status"></p>
        </form>

        <section class="panel list-panel">
          <div class="section-title">
            <h2>Tracked patches</h2>
            <span id="repo-name"></span>
          </div>
          <div id="patch-list" class="patch-list"></div>
        </section>
      </section>
    </main>

    <template id="patch-template">
      <article class="patch-card">
        <div class="patch-main">
          <div>
            <h3></h3>
            <p class="meta"></p>
          </div>
          <button class="delete-button" title="Delete patch" aria-label="Delete patch">x</button>
        </div>
        <div class="badges"></div>
        <pre class="commit"></pre>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
