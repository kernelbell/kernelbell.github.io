<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>kernelbell</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="shell">
      <section class="masthead">
        <div class="brand-row">
          <svg class="brand-mark" viewBox="0 0 48 48" aria-hidden="true">
            <path d="M24 5 39 13v12c0 9-6 15-15 18C15 40 9 34 9 25V13l15-8Z"></path>
            <path d="M17 25h14M19 18h10M20 32h8"></path>
          </svg>
          <div>
          <p class="eyebrow">kernelbell</p>
          <h1>Linux patch merge monitor</h1>
          </div>
        </div>
        <button id="refresh" class="secondary compact-button" title="Refresh status" aria-label="Refresh status">Refresh</button>
      </section>

      <section class="panel metrics" aria-label="Monitor summary">
        <div>
          <svg class="metric-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5h14v14H5z"></path><path d="M8 9h8M8 13h5"></path></svg>
          <span id="total-count">0</span>
          <label>Tracked</label>
        </div>
        <div>
          <svg class="metric-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12h16"></path><path d="M13 5l7 7-7 7"></path></svg>
          <span id="mainline-count">0</span>
          <label>Mainline</label>
        </div>
        <div>
          <svg class="metric-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 4v16"></path><path d="M6 8h7a4 4 0 0 1 0 8H6"></path></svg>
          <span id="stable-count">0</span>
          <label>Stable</label>
        </div>
        <div>
          <svg class="metric-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 6v6l4 2"></path><path d="M21 12a9 9 0 1 1-9-9"></path></svg>
          <span id="generated-at">-</span>
          <label>Last Check</label>
        </div>
      </section>

      <section class="workspace">
        <form id="patch-form" class="panel editor">
          <h2>Add patch</h2>
          <label>
            <span>Patch title</span>
            <input id="title" name="title" required placeholder="subsystem: fix something important">
          </label>
          <fieldset class="target-group">
            <legend>Targets</legend>
            <label class="check-row">
              <input type="checkbox" name="targets" value="mainline" checked>
              <span>mainline</span>
            </label>
            <label class="check-row">
              <input type="checkbox" name="targets" value="linux-5.10.y">
              <span>linux-5.10.y</span>
            </label>
            <label class="check-row">
              <input type="checkbox" name="targets" value="linux-6.6.y" checked>
              <span>linux-6.6.y</span>
            </label>
          </fieldset>
          <div class="grid-2">
            <label>
              <span>Email</span>
              <input id="notify" name="notify" type="email" placeholder="you@example.com">
            </label>
          </div>
          <label>
            <span>Admin password</span>
            <input id="admin-password" name="admin_password" type="password" autocomplete="off" placeholder="password for encrypted admin token">
          </label>
          <div class="actions">
            <button type="submit">Add</button>
            <button id="test-mail" type="button" class="secondary">Test mail</button>
          </div>
          <details class="setup-box">
            <summary>Admin token setup</summary>
            <label>
              <span>One-time GitHub token</span>
              <input id="setup-token" type="password" autocomplete="off" placeholder="contents write + actions write">
            </label>
            <button id="store-admin" type="button" class="secondary">Store encrypted token</button>
            <p class="hint">The token is encrypted with the admin password before it is committed to `docs/admin.json`.</p>
          </details>
          <p id="form-message" class="message" role="status"></p>
        </form>

        <section class="panel list-panel">
          <div class="section-title">
            <h2>Tracked patches</h2>
            <span id="repo-name"></span>
          </div>
          <div id="patch-list" class="patch-list"></div>
        </section>
      </section>
    </main>

    <template id="patch-template">
      <article class="patch-card">
        <div class="patch-main">
          <div>
            <h3></h3>
            <p class="meta"></p>
          </div>
          <button class="delete-button" title="Delete patch" aria-label="Delete patch">x</button>
        </div>
        <div class="badges"></div>
        <pre class="commit"></pre>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
